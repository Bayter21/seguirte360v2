server.port=${PORT:8080}

# ── Database ──────────────────────────────────────────────────────────────────
# Railway provides MYSQL_* variables automatically when a MySQL service is added.
# Locally, falls back to H2 in-memory if no MYSQL_URL is set.
spring.datasource.url=${MYSQL_URL:jdbc:h2:mem:seguirtedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${MYSQL_USER:sa}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2 console (only useful locally, harmless in prod)
spring.h2.console.enabled=true

# Thymeleaf
spring.thymeleaf.cache=false
